description: >
  Run Cypress tests using the cypress/default executor with a specified node version.
usage:
  version: 2.1
  orbs:
    cypress: cypress-io/cypress@3
jobs:
  run-cypress-in-specified-node_version:
    executor:
      name: cypress/default
      node_version: "20.6"
    steps:
      - cypress/install:
          package_manager: "yarn"
      - cypress/run_tests:
          start_command: "npm run start:dev"
          cypress_command: "npx cypress run"
workflows:
  use-my-orb:
    jobs:
      - run-cypress-in-specified-node_version:
          name: Run Cypress in Node 20
